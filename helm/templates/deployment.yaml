apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "wc2026.fullname" . }}
  labels:
    {{- include "wc2026.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "wc2026.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "wc2026.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.service.targetPort }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
